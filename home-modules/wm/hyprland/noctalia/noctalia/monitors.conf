# Monitor configuration
# You can get monitor names with: hyprctl monitors
# Format: monitor=name,resolution@refreshrate,position,scale

# Example configurations (uncomment and modify as needed):
# monitor=eDP-1,1920x1080@120,0x0,2
# monitor=HDMI-A-1,1920x1080@60,1920x0,1

# Default: automatically configure all monitors
monitor=,preferred,auto,1

# To disable a specific monitor:
# monitor=name,disable
