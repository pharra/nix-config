# === Application Launchers ===
bind = SUPER, T, exec, alacritty
bind = SUPER, space, exec, noctalia-shell ipc call launcher toggle
bind = SUPER, V, exec, noctalia-shell ipc call launcher clipboard
bind = SUPER, M, exec, noctalia-shell ipc call systemMonitor toggle
bind = SUPER, comma, exec, noctalia-shell ipc call settings toggle
bind = SUPER, N, exec, noctalia-shell ipc call notifications toggleHistory
# bind = SUPER SHIFT, N, exec, # notepad not available in noctalia-shell
bind = SUPER, Y, exec, noctalia-shell ipc call wallpaper toggle
# bind = SUPER, TAB, exec, # hypr-specific function not available
bind = SUPER, X, exec, noctalia-shell ipc call sessionMenu toggle

# === Cheat sheet
# bind = SUPER SHIFT, Slash, exec, # keybinds not available in noctalia-shell

# === Security ===
bind = SUPER ALT, L, exec, noctalia-shell ipc call lockScreen lock
bind = SUPER SHIFT, E, exit
bind = CTRL ALT, Delete, exec, noctalia-shell ipc call systemMonitor toggle

# === Audio Controls ===
bindel = , XF86AudioRaiseVolume, exec, noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, noctalia-shell ipc call volume decrease
bindl = , XF86AudioMute, exec, noctalia-shell ipc call volume muteOutput
bindl = , XF86AudioMicMute, exec, noctalia-shell ipc call volume muteInput
bindl = , XF86AudioPause, exec, noctalia-shell ipc call media playPause
bindl = , XF86AudioPlay, exec, noctalia-shell ipc call media playPause
bindl = , XF86AudioPrev, exec, noctalia-shell ipc call media previous
bindl = , XF86AudioNext, exec, noctalia-shell ipc call media next
bindel = CTRL, XF86AudioRaiseVolume, exec, noctalia-shell ipc call media seekRelative 5
bindel = CTRL, XF86AudioLowerVolume, exec, noctalia-shell ipc call media seekRelative -5

# === Brightness Controls ===
bindel = , XF86MonBrightnessUp, exec, noctalia-shell ipc call brightness increase
bindel = , XF86MonBrightnessDown, exec, noctalia-shell ipc call brightness decrease

# === Window Management ===
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, T, togglefloating
bind = SUPER, W, togglegroup
# bind = SUPER SHIFT, W, exec, # window-rules not available in noctalia-shell

# === Focus Navigation ===
bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# === Window Movement ===
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

# === Column Navigation ===
bind = SUPER, Home, focuswindow, first
bind = SUPER, End, focuswindow, last

# === Monitor Navigation ===
bind = SUPER CTRL, left, focusmonitor, l
bind = SUPER CTRL, right, focusmonitor, r
bind = SUPER CTRL, H, focusmonitor, l
bind = SUPER CTRL, J, focusmonitor, d
bind = SUPER CTRL, K, focusmonitor, u
bind = SUPER CTRL, L, focusmonitor, r

# === Move to Monitor ===
bind = SUPER SHIFT CTRL, left, movewindow, mon:l
bind = SUPER SHIFT CTRL, down, movewindow, mon:d
bind = SUPER SHIFT CTRL, up, movewindow, mon:u
bind = SUPER SHIFT CTRL, right, movewindow, mon:r
bind = SUPER SHIFT CTRL, H, movewindow, mon:l
bind = SUPER SHIFT CTRL, J, movewindow, mon:d
bind = SUPER SHIFT CTRL, K, movewindow, mon:u
bind = SUPER SHIFT CTRL, L, movewindow, mon:r

# === Workspace Navigation ===
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, Page_Up, workspace, e-1
bind = SUPER, U, workspace, e+1
bind = SUPER, I, workspace, e-1
bind = SUPER CTRL, down, movetoworkspace, e+1
bind = SUPER CTRL, up, movetoworkspace, e-1
bind = SUPER CTRL, U, movetoworkspace, e+1
bind = SUPER CTRL, I, movetoworkspace, e-1

# === Workspace Management ===
# bind = CTRL SHIFT, R, exec, # workspace-rename not available in noctalia-shell

# === Move Workspaces ===
bind = SUPER SHIFT, Page_Down, movetoworkspace, e+1
bind = SUPER SHIFT, Page_Up, movetoworkspace, e-1
bind = SUPER SHIFT, U, movetoworkspace, e+1
bind = SUPER SHIFT, I, movetoworkspace, e-1

# === Mouse Wheel Navigation ===
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bind = SUPER CTRL, mouse_down, movetoworkspace, e+1
bind = SUPER CTRL, mouse_up, movetoworkspace, e-1

# === Numbered Workspaces ===
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# === Move to Numbered Workspaces ===
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# === Column Management ===
bind = SUPER, bracketleft, layoutmsg, preselect l
bind = SUPER, bracketright, layoutmsg, preselect r

# === Sizing & Layout ===
bind = SUPER, R, layoutmsg, togglesplit
bind = SUPER CTRL, F, resizeactive, exact 100%

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0

# === Manual Sizing ===
binde = SUPER, minus, resizeactive, -10% 0
binde = SUPER, equal, resizeactive, 10% 0
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER SHIFT, equal, resizeactive, 0 10%

